services:
  web:
    build: .
    ports:
      - "8083:80"
    container_name: academias_app
    volumes:
      - .:/var/www/html
    restart: always
    depends_on:
      - db

  db:
    image: mariadb:10.6
    container_name: academias_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: academias
      MYSQL_USER: academia_user
      MYSQL_PASSWORD: secret
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: academias_phpmyadmin
    restart: always
    ports:
      - "8082:80"   # phpMyAdmin estará disponible en http://localhost:8081
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: academia_user
      PMA_PASSWORD: secret
    depends_on:
      - db

volumes:
  db_data:
